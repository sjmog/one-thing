<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>One Thing</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico" id="favicon-ico">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" id="favicon-32">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png" id="favicon-16">
  <style>
    @font-face {
      font-family: 'Funnel Sans';
      src: url('FunnelSans.woff2') format('woff2');
      font-weight: 300 800;
      font-style: normal;
      font-display: swap;
    }

    :root {
      /* Surface colors */
      --surface: #f7f7f2;
      --surface-raised: #ffffff;
      --surface-elevated: #ffffff;
      --surface-sunken: #f2f2ec;
      --surface-tooltip: #363635;
      --surface-overlay: #818179;
      --surface-accent-blue: #eaf4fe;
      --surface-accent-green: #f2f6e1;
      --surface-accent-purple: #f3f0fa;
      --surface-tint-accent: #e5eacd;
      --surface-tint-neutral: #625a220f;
      /* Ink colors */
      --ink-primary: #292929;
      --ink-secondary-strong: #4e4d4b;
      --ink-secondary: #72726e;
      --ink-tertiary: #acada8;
      --ink-accent: #788c15;
      --ink-accent-strong: #5b6f00;
      --ink-danger: #bd4a30;
      --ink-primary-inverse: #fcfcf8;
      --ink-secondary-inverse: #9e9e99;
      --border-color: #e5e5e0;
    }

    body.dark {
      /* Surface colors */
      --surface: #292929;
      --surface-raised: #313130;
      --surface-elevated: #363635;
      --surface-sunken: #212121;
      --surface-tooltip: #363635;
      --surface-overlay: #4e4d4b;
      --surface-accent-blue: #2e303b;
      --surface-accent-green: #313225;
      --surface-accent-purple: #34313e;
      --surface-tint-accent: #434625;
      --surface-tint-neutral: #ffffff0a;
      /* Ink colors */
      --ink-primary: #fcfcf8;
      --ink-secondary-strong: #acada8;
      --ink-secondary: #9e9e99;
      --ink-tertiary: #818179;
      --ink-accent: #788c15;
      --ink-accent-strong: #b2c248;
      --ink-danger: #ec7558;
      --ink-primary-inverse: #292929;
      --ink-secondary-inverse: #72726e;
      --border-color: #404040;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Funnel Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--surface-sunken);
      color: var(--ink-primary);
      height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      transition: background 0.3s ease, color 0.3s ease;
    }

    * {
      transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease;
    }

    /* Header */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      padding: 16px;
      z-index: 10;
      transition: left 0.2s ease;
    }

    body.sidebar-open .header {
      left: 280px;
    }

    .header button {
      background: none;
      border: none;
      color: #acada8;
      cursor: pointer;
      font-size: 14px;
      padding: 4px 8px;
      transition: color 0s;
    }

    .header button:hover {
      color: #72726e;
    }

    .header .current-date {
      font-size: 14px;
      color: #acada8;
      min-width: 140px;
      text-align: center;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      transition: color 0s, background 0s;
    }

    .header .current-date:hover {
      color: #72726e;
    }

    /* Date Picker */
    .date-picker {
      position: absolute;
      top: 50px;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      padding: 16px;
      z-index: 100;
      display: none;
    }

    .date-picker.open {
      display: block;
    }

    .date-picker-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .date-picker-header button {
      background: none;
      border: none;
      color: #72726e;
      cursor: pointer;
      font-size: 14px;
      padding: 4px 8px;
      border-radius: 4px;
    }

    .date-picker-header button:hover {
      color: #292929;
      background: #eee;
    }

    .date-picker-month {
      font-size: 14px;
      font-weight: 500;
      color: #292929;
    }

    .date-picker-grid {
      display: grid;
      grid-template-columns: repeat(7, 32px);
      gap: 2px;
    }

    .date-picker-day-label {
      font-size: 11px;
      color: #acada8;
      text-align: center;
      padding: 4px 0;
    }

    .date-picker-day {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: #292929;
      border: none;
      background: none;
      border-radius: 50%;
      cursor: pointer;
      transition: background 0s;
    }

    .date-picker-day:hover {
      background: #eee;
    }

    .date-picker-day.other-month {
      color: #acada8;
    }

    .date-picker-day.today:not(.selected) {
      font-weight: 600;
      border: 1.5px dashed var(--ink-tertiary);
    }

    .date-picker-day.selected {
      background: #333;
      color: white;
    }

    .date-picker-day.selected:hover {
      background: #555;
    }

    .date-picker-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 99;
      display: none;
    }

    .date-picker-overlay.open {
      display: block;
    }

    /* Sidebar Toggle */
    .sidebar-toggle {
      position: fixed;
      top: 16px;
      left: 20px;
      z-index: 20;
      background: none;
      border: none;
      color: #acada8;
      cursor: pointer;
      font-size: 20px;
      padding: 4px 8px;
      border-radius: 8px;
      transition: left 0.2s ease, color 0s, background 0s;
    }

    .sidebar-toggle:hover {
      color: #72726e;
    }

    /* Sidebar */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: 280px;
      background: var(--surface);
      box-shadow: 1px 0 0 rgba(0, 0, 0, 0.05);
      transform: translateX(-100%);
      transition: transform 0.2s ease, background-color 0.3s ease, border-color 0.3s ease;
      z-index: 15;
      display: flex;
      flex-direction: column;
    }

    .sidebar.open {
      transform: translateX(0);
    }

    .sidebar-header {
      padding: 16px 20px;
    }

    .sidebar-title {
      font-size: 11px;
      letter-spacing: 3px;
      color: #acada8;
      text-transform: uppercase;
    }

    /* Main content push */
    .main-content {
      transition: margin-left 0.2s ease;
    }

    body.sidebar-open .main-content {
      margin-left: 280px;
    }

    body.sidebar-open .sidebar-toggle {
      left: 300px;
    }

    .sidebar-content {
      flex: 1;
      overflow-y: auto;
      padding: 0 20px 16px;
    }

    .list-items {
      list-style: none;
    }

    .list-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
    }

    .list-item-text {
      flex: 1;
      font-size: 15px;
      outline: none;
      line-height: 1.4;
      color: var(--ink-primary);
    }

    .list-item.done .list-item-text {
      text-decoration: line-through;
      opacity: 0.4;
    }

    .list-item .item-actions {
      flex-shrink: 0;
    }


    .list-placeholder {
      display: flex;
      align-items: center;
      padding: 8px 0;
      cursor: text;
    }

    .list-placeholder-text {
      flex: 1;
      font-size: 15px;
      outline: none;
      color: #acada8;
      line-height: 1.4;
    }



    /* Plan Mode */
    .plan-mode {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }


    /* Theme Toggle */
    .theme-toggle {
      position: fixed;
      top: 16px;
      right: 20px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 8px;
      color: #acada8;
      transition: color 0s;
      z-index: 10;
    }

    .theme-toggle:hover {
      color: #72726e;
    }

    .theme-toggle svg {
      width: 18px;
      height: 18px;
    }

    .theme-toggle .moon-icon {
      display: none;
    }

    body.dark .theme-toggle .sun-icon {
      display: none;
    }

    body.dark .theme-toggle .moon-icon {
      display: block;
    }

    /* Dark Mode */
    body.dark .date-picker {
      background: #222;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    body.dark .date-picker-month {
      color: #fcfcf8;
    }

    body.dark .date-picker-header button {
      color: #818179;
    }

    body.dark .date-picker-header button:hover {
      color: #72726e;
      background: #333;
    }

    body.dark .date-picker-day {
      color: #fcfcf8;
    }

    body.dark .date-picker-day:hover {
      background: #333;
    }

    body.dark .date-picker-day.other-month {
      color: #818179;
    }

    body.dark .date-picker-day.selected {
      background: #e0e0e0;
      color: #292929;
    }

    body.dark .date-picker-day.selected:hover {
      background: #ccc;
    }

    body.dark .goal-input {
      color: #fcfcf8;
    }

    body.dark .nice-item {
      color: #acada8;
    }

    body.dark .sidebar-toggle,
    body.dark .theme-toggle,
    body.dark .header button,
    body.dark .header .current-date,
    body.dark .goal-label,
    body.dark .nice-label,
    body.dark .sidebar-title {
      color: #818179;
    }

    body.dark .sidebar-toggle:hover,
    body.dark .theme-toggle:hover,
    body.dark .header button:hover,
    body.dark .header .current-date:hover,
    body.dark .goal-label:hover,
    body.dark .nice-label:hover {
      color: #72726e;
    }


    /* Timer */
    .timer {
      position: fixed;
      bottom: 20px;
      right: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 10;
    }

    .timer-display {
      font-size: 28px;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
      color: #acada8;
      transition: color 0s ease;
    }

    .timer.running .timer-display {
      color: #4e4d4b;
    }

    .timer-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px;
      color: #acada8;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0s, background 0s;
    }

    .timer-btn:hover {
      color: #72726e;
      background: #f5f5f5;
    }

    .timer-btn svg {
      width: 18px;
      height: 18px;
    }

    .timer-reset {
      display: none;
    }

    .timer.paused.can-reset .timer-reset {
      display: flex;
    }

    .timer-display {
      outline: none;
    }

    .timer-display:focus {
      color: #72726e;
    }

    body.dark .timer-display:focus {
      color: #72726e;
    }

    .timer-focus-wrapper {
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      margin-bottom: 12px;
      text-align: center;
    }

    .timer-focus {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #72726e;
      outline: none;
      min-width: 120px;
      min-height: 16px;
      text-align: center;
      transition: color 0s ease;
    }

    .timer-focus:empty::before {
      content: 'FOCUS';
      color: #acada8;
      cursor: text;
      transition: color 0s;
    }

    .timer-focus:empty:hover::before {
      color: #72726e;
    }

    .timer-focus:empty:focus::before {
      content: '';
    }

    body.dark .timer-focus {
      color: #acada8;
    }

    body.dark .timer-focus:empty::before {
      color: #818179;
    }

    body.dark .timer-focus:empty:hover::before {
      color: #72726e;
    }

    /* Install hint */
    .install-hint {
      position: fixed;
      bottom: 20px;
      left: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: #f5f5f5;
      border-radius: 20px;
      font-size: 13px;
      color: #72726e;
      z-index: 10;
      transition: background 0s, color 0s;
    }

    .install-hint.hidden {
      display: none;
    }

    .install-hint-text {
      cursor: pointer;
    }

    .install-hint-text:hover {
      color: #4e4d4b;
    }

    .install-hint-dismiss {
      width: 18px;
      height: 18px;
      background: #eee;
    }

    .install-hint-dismiss svg {
      width: 10px;
      height: 10px;
    }

    .install-hint-dismiss:hover {
      background: #ddd;
    }

    body.dark .install-hint {
      background: #2a2a2a;
      color: #9e9e99;
    }

    body.dark .install-hint-text:hover {
      color: #acada8;
    }

    body.dark .install-hint-dismiss {
      background: #333;
    }

    body.dark .install-hint-dismiss:hover {
      background: #444;
    }

    /* Install modal */
    .install-modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 100;
      display: none;
    }

    .install-modal-overlay.open {
      display: block;
    }

    .install-modal {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      border-radius: 16px;
      padding: 32px;
      max-width: 400px;
      width: 90%;
      z-index: 101;
      display: none;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }

    .install-modal.open {
      display: block;
    }

    .install-modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: #eee;
    }

    .install-modal-close:hover {
      background: #ddd;
    }

    .install-modal-title {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #acada8;
      margin-bottom: 16px;
    }

    .install-modal-browser {
      font-size: 20px;
      font-weight: 600;
      color: #292929;
      margin-bottom: 20px;
    }

    .install-modal-steps {
      font-size: 14px;
      color: #4e4d4b;
      line-height: 1.8;
    }

    .install-modal-steps ol {
      margin: 0;
      padding-left: 20px;
    }

    .install-modal-steps code {
      background: #f5f5f5;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 12px;
    }

    body.dark .install-modal {
      background: #222;
    }

    body.dark .install-modal-close {
      background: #333;
    }

    body.dark .install-modal-close:hover {
      background: #444;
    }

    body.dark .install-modal-title {
      color: #818179;
    }

    body.dark .install-modal-browser {
      color: #fcfcf8;
    }

    body.dark .install-modal-steps {
      color: #acada8;
    }

    body.dark .install-modal-steps code {
      background: #333;
    }

    body.dark .timer-display {
      color: #818179;
    }

    body.dark .timer.running .timer-display {
      color: #72726e;
    }

    body.dark .timer-btn {
      color: #818179;
    }

    body.dark .timer-btn:hover {
      color: #72726e;
      background: #333;
    }

    /* Center content */
    .center-content {
      position: absolute;
      top: 38.2%;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      transition: left 0.2s ease;
    }

    body.sidebar-open .center-content {
      left: calc(50% + 140px);
    }

    /* Goal */
    .goal-section {
      text-align: center;
      margin-bottom: 32px;
    }

    .goal-label {
      font-size: 11px;
      letter-spacing: 3px;
      color: #acada8;
      margin-bottom: 12px;
      cursor: pointer;
      transition: color 0s;
    }

    .goal-label:hover {
      color: #72726e;
    }

    .goal-wrapper {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .goal-wrapper::after {
      content: '';
      position: absolute;
      left: 100%;
      top: 0;
      bottom: 0;
      width: 60px;
      z-index: 0;
    }

    .goal-input {
      font-size: 42px;
      font-weight: 600;
      border: none;
      background: transparent;
      text-align: center;
      max-width: 600px;
      min-width: 200px;
      color: #292929;
      outline: none;
      transition: color 0s ease, opacity 0s ease;
    }

    .goal-input:empty::before {
      content: '\00a0';
    }

    .goal-section.completed .goal-input {
      text-decoration: line-through;
      opacity: 0.4;
    }

    .goal-actions {
      position: absolute;
      left: calc(100% + 16px);
      top: 50%;
      transform: translateY(-40%);
      display: flex;
      gap: 4px;
      z-index: 1;
    }

    /* Confetti Canvas */
    #confetti-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1000;
    }

    body.dark .goal-input {
      color: #fcfcf8;
    }

    /* Check/undo icon toggle */
    .undo-icon {
      display: none;
    }

    .goal-section.completed .goal-check .check-icon,
    .nice-item-wrapper.done .check-icon,
    .list-item.done .check-icon {
      display: none;
    }

    .goal-section.completed .goal-check .undo-icon,
    .nice-item-wrapper.done .undo-icon,
    .list-item.done .undo-icon {
      display: block;
    }

    /* Nice to Do */
    .nice-section {
      text-align: center;
      width: 100%;
      max-width: 400px;
    }

    .nice-label {
      font-size: 11px;
      letter-spacing: 3px;
      color: #acada8;
      margin-bottom: 16px;
      cursor: pointer;
      transition: color 0s;
    }

    .nice-label:hover {
      color: #72726e;
    }

    .nice-items {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .nice-item-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nice-item-wrapper .item-actions {
      position: absolute;
      left: calc(100% + 8px);
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      gap: 4px;
      z-index: 1;
    }

    .nice-item-wrapper::after {
      content: '';
      position: absolute;
      left: 100%;
      top: 0;
      bottom: 0;
      width: 40px;
      z-index: 0;
    }

    .nice-item {
      font-size: 16px;
      color: #4e4d4b;
      outline: none;
      min-height: 24px;
      min-width: 100px;
      text-align: center;
      transition: color 0s ease, opacity 0s ease;
    }

    .nice-item:empty::before {
      content: '\00a0';
    }

    .nice-item-wrapper.done .nice-item {
      text-decoration: line-through;
      opacity: 0.4;
    }

    /* Action buttons (check & delete) */
    .item-actions {
      opacity: 0;
      display: flex;
      gap: 4px;
      transition: opacity 0s;
    }

    .nice-item-wrapper:hover .item-actions,
    .list-item:hover .item-actions,
    .goal-wrapper:hover .item-actions,
    .item-actions:hover {
      opacity: 1;
    }

    .goal-section.empty .item-actions,
    .nice-item-wrapper.empty .item-actions {
      display: none;
    }

    .action-btn {
      background: #eee;
      border: none;
      cursor: pointer;
      padding: 0;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0s;
      flex-shrink: 0;
    }

    .action-btn svg {
      width: 12px;
      height: 12px;
      stroke: #acada8;
      transition: stroke 0s;
    }

    .action-btn:hover {
      background: #ddd;
    }

    .action-btn:hover svg {
      stroke: #72726e;
    }

    body.dark .item-actions .action-btn {
      background: #333;
    }

    body.dark .action-btn:hover {
      background: #444;
    }

    .goal-check {
      width: 32px;
      height: 32px;
    }

    .goal-check svg {
      width: 16px;
      height: 16px;
    }

    /* Mobile: move content to top and allow full width */
    @media (max-width: 600px) {
      .center-content {
        top: 80px;
        left: 0;
        right: 0;
        transform: none;
        width: 100%;
        max-width: 100%;
        padding: 20px;
      }

      .goal-input {
        font-size: 28px;
        max-width: 100%;
      }

      .nice-section {
        max-width: 100%;
      }

      .timer {
        display: none;
      }

      .header {
        gap: 8px;
      }

      .item-actions,
      .goal-actions {
        display: none !important;
      }

      .sidebar {
        width: 100%;
      }

      body.sidebar-open .sidebar-toggle {
        left: 20px;
      }

      body.sidebar-open .main-content {
        margin-left: 0;
      }

      body.sidebar-open .header {
        left: 0;
      }

      body.sidebar-open .center-content {
        display: none;
      }
    }

    /* Sync UI */
    .sync-toggle {
      position: fixed;
      top: 16px;
      right: 52px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 8px;
      color: #acada8;
      transition: color 0s;
      z-index: 10;
    }

    .sync-toggle:hover {
      color: #72726e;
    }

    .sync-toggle svg {
      width: 18px;
      height: 18px;
    }

    .sync-toggle.syncing svg {
      animation: spin 1s linear infinite;
    }

    .sync-toggle.synced {
      color: #788c15;
    }

    .sync-toggle.error {
      color: #bd4a30;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    body.dark .sync-toggle {
      color: #818179;
    }

    body.dark .sync-toggle:hover {
      color: #72726e;
    }

    body.dark .sync-toggle.synced {
      color: #b2c248;
    }

    body.dark .sync-toggle.error {
      color: #ec7558;
    }

    /* Sync Modal */
    .sync-modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 100;
      display: none;
    }

    .sync-modal-overlay.open {
      display: block;
    }

    .sync-modal {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      border-radius: 16px;
      padding: 32px;
      max-width: 400px;
      width: 90%;
      z-index: 101;
      display: none;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }

    .sync-modal.open {
      display: block;
    }

    .sync-modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: #eee;
    }

    .sync-modal-close:hover {
      background: #ddd;
    }

    .sync-modal-title {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #acada8;
      margin-bottom: 16px;
    }

    .sync-modal-heading {
      font-size: 20px;
      font-weight: 600;
      color: #292929;
      margin-bottom: 20px;
    }

    .sync-modal-content {
      font-size: 14px;
      color: #4e4d4b;
      line-height: 1.6;
    }

    .sync-input {
      width: 100%;
      padding: 12px 16px;
      font-size: 16px;
      border: 1px solid #e5e5e0;
      border-radius: 8px;
      margin-bottom: 16px;
      outline: none;
      font-family: inherit;
    }

    .sync-input:focus {
      border-color: #788c15;
    }

    .sync-btn {
      width: 100%;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 500;
      color: white;
      background: #292929;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
    }

    .sync-btn:hover {
      background: #4e4d4b;
    }

    .sync-btn:disabled {
      background: #acada8;
      cursor: not-allowed;
    }

    .sync-btn-secondary {
      background: #eee;
      color: #4e4d4b;

    .sync-btn-secondary:hover {

    .sync-status {

    .sync-status.success {

    body.dark .sync-modal {

  </style>

        <path d="M21 12a9 9 0 0 1-9 9m9-9a9 9 0 0 0-9-9m9 9H3m9 9a9 9 0 0 1-9-9m9 9c1.66 0 3-4.03 3-9s-1.34-9-3-9m0 18c-1.66 0-3-4.03-3-9s1.34-9 3-9m-9 9a9 9 0 0 1 9-9"/>

    <!-- Sync Modal -->

              <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
              <svg class="undo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>

  <canvas id="confetti-canvas"></canvas>

  <script>
    // State
    let currentDate = new Date();
    let sidebarOpen = localStorage.getItem('sidebarOpen') === 'true';

    // Helpers
    const formatDate = (date) => {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    };
    const displayDate = (date) => date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    const generateId = () => Math.random().toString(36).substr(2, 9);

    // Storage Keys
    const LIST_KEY = 'onething-list';
    const planKey = (date) => `onething-plan-${formatDate(date)}`;

    // Load/Save List
    const loadList = () => {
      try {
        return JSON.parse(localStorage.getItem(LIST_KEY)) || [];
      } catch {
        return [];
      }
    };

    const saveList = (items) => {
      localStorage.setItem(LIST_KEY, JSON.stringify(items));
    };

    // Load/Save Plan
    const loadPlan = (date) => {
      try {
        return JSON.parse(localStorage.getItem(planKey(date))) || {
          goal: '',
          niceToDo: [],
          hygieneLeft: [],
          hygieneRight: []
        };
      } catch {
        return { goal: '', niceToDo: [], hygieneLeft: [], hygieneRight: [] };
      }
    };

    const savePlan = (date, plan) => {
      localStorage.setItem(planKey(date), JSON.stringify(plan));
    };

    // DOM Elements
    const $goalInput = document.getElementById('goal-input');
    const $goalLabel = document.getElementById('goal-label');
    const $goalSection = document.getElementById('goal-section');
    const $goalCheck = document.getElementById('goal-check');
    const $confettiCanvas = document.getElementById('confetti-canvas');
    const $niceItems = document.getElementById('nice-items');
    const $niceLabel = document.getElementById('nice-label');
    const $themeToggle = document.getElementById('theme-toggle');
    const $currentDate = document.getElementById('current-date');
    const $prevDay = document.getElementById('prev-day');
    const $nextDay = document.getElementById('next-day');
    const $listItems = document.getElementById('list-items');
    const $sidebar = document.getElementById('sidebar');
    const $sidebarToggle = document.getElementById('sidebar-toggle');
    const $datePicker = document.getElementById('date-picker');
    const $datePickerOverlay = document.getElementById('date-picker-overlay');
    const $pickerMonth = document.getElementById('picker-month');
    const $pickerGrid = document.getElementById('picker-grid');
    const $pickerPrevMonth = document.getElementById('picker-prev-month');
    const $pickerNextMonth = document.getElementById('picker-next-month');

    // Date picker state
    let pickerDate = new Date();
    let pickerOpen = false;

    // Date picker functions
    const openDatePicker = () => {
      pickerDate = new Date(currentDate);
      pickerOpen = true;
      $datePicker.classList.add('open');
      $datePickerOverlay.classList.add('open');
      renderDatePicker();
    };

    const closeDatePicker = () => {
      pickerOpen = false;
      $datePicker.classList.remove('open');
      $datePickerOverlay.classList.remove('open');
    };

    const renderDatePicker = () => {
      const year = pickerDate.getFullYear();
      const month = pickerDate.getMonth();

      $pickerMonth.textContent = pickerDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);
      const startDay = firstDay.getDay();
      const daysInMonth = lastDay.getDate();

      const today = new Date();
      const todayStr = formatDate(today);
      const selectedStr = formatDate(currentDate);

      let html = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat']
        .map(d => `<div class="date-picker-day-label">${d}</div>`).join('');

      // Previous month days
      const prevMonth = new Date(year, month, 0);
      const prevDays = prevMonth.getDate();
      for (let i = startDay - 1; i >= 0; i--) {
        const day = prevDays - i;
        const date = new Date(year, month - 1, day);
        html += `<button class="date-picker-day other-month" data-date="${formatDate(date)}">${day}</button>`;
      }

      // Current month days
      for (let day = 1; day <= daysInMonth; day++) {
        const date = new Date(year, month, day);
        const dateStr = formatDate(date);
        const isToday = dateStr === todayStr;
        const isSelected = dateStr === selectedStr;
        const classes = ['date-picker-day'];
        if (isToday) classes.push('today');
        if (isSelected) classes.push('selected');
        html += `<button class="${classes.join(' ')}" data-date="${dateStr}">${day}</button>`;
      }

      // Next month days
      const totalCells = Math.ceil((startDay + daysInMonth) / 7) * 7;
      const nextDays = totalCells - startDay - daysInMonth;
      for (let day = 1; day <= nextDays; day++) {
        const date = new Date(year, month + 1, day);
        html += `<button class="date-picker-day other-month" data-date="${formatDate(date)}">${day}</button>`;
      }

      $pickerGrid.innerHTML = html;
    };

    $currentDate.addEventListener('click', openDatePicker);
    $datePickerOverlay.addEventListener('click', closeDatePicker);

    $pickerPrevMonth.addEventListener('click', () => {
      pickerDate.setMonth(pickerDate.getMonth() - 1);
      renderDatePicker();
    });

    $pickerNextMonth.addEventListener('click', () => {
      pickerDate.setMonth(pickerDate.getMonth() + 1);
      renderDatePicker();
    });

    $pickerGrid.addEventListener('click', (e) => {
      if (e.target.classList.contains('date-picker-day')) {
        const dateStr = e.target.dataset.date;
        const [year, month, day] = dateStr.split('-').map(Number);
        currentDate = new Date(year, month - 1, day);
        closeDatePicker();
        renderPlan();
      }
    });

    // Sidebar toggle
    const toggleSidebar = () => {
      sidebarOpen = !sidebarOpen;
      localStorage.setItem('sidebarOpen', sidebarOpen);
      $sidebar.classList.toggle('open', sidebarOpen);
      document.body.classList.toggle('sidebar-open', sidebarOpen);
      if (sidebarOpen) renderList();
    };

    $sidebarToggle.addEventListener('click', toggleSidebar);

    // Icon SVGs
    const checkIcon = `<svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg><svg class="undo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>`;

    // Render List (Todo)
    const renderList = () => {
      const items = loadList();
      $listItems.innerHTML = items.map((item, i) => `
        <li class="list-item ${item.done ? 'done' : ''}" data-index="${i}">
          <span class="list-item-text" contenteditable="true">${escapeHtml(item.text)}</span>
          ${item.text ? `<div class="item-actions">
            <button class="action-btn check-btn">${checkIcon}</button>
          </div>` : ''}
        </li>
      `).join('') + `
        <li class="list-placeholder">
          <span class="list-placeholder-text" contenteditable="true"></span>
        </li>
      `;

      // Attach event listeners to existing items
      $listItems.querySelectorAll('.list-item').forEach((li, i) => {
        const span = li.querySelector('.list-item-text');
        const checkBtn = li.querySelector('.check-btn');

        if (checkBtn) {
          checkBtn.addEventListener('click', () => {
            const items = loadList();
            items[i].done = !items[i].done;
            saveList(items);
            renderList();
          });
        }

        span.addEventListener('input', () => {
          replaceArrowsInContentEditable(span);
          const items = loadList();
          items[i].text = span.textContent;
          saveList(items);
        });

        span.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
            e.preventDefault();
            // Focus the placeholder to add new item
            $listItems.querySelector('.list-placeholder-text').focus();
          } else if (e.key === 'Backspace' && span.textContent === '') {
            e.preventDefault();
            const items = loadList();
            items.splice(i, 1);
            saveList(items);
            renderList();
            setTimeout(() => {
              const prevSpan = $listItems.querySelectorAll('.list-item-text')[i - 1];
              if (prevSpan) {
                focusAtEnd(prevSpan);
              } else {
                $listItems.querySelector('.list-placeholder-text').focus();
              }
            }, 0);
          } else if (e.key === 'Tab' && e.shiftKey) {
            e.preventDefault();
            const allSpans = $listItems.querySelectorAll('.list-item-text');
            if (i > 0) focusAtEnd(allSpans[i - 1]);
          } else if (e.key === 'Tab' && !e.shiftKey) {
            e.preventDefault();
            const allSpans = $listItems.querySelectorAll('.list-item-text');
            if (i < allSpans.length - 1) {
              focusAtEnd(allSpans[i + 1]);
            } else {
              // Last item - create a new one
              const items = loadList();
              items.push({ id: generateId(), text: '', done: false });
              saveList(items);
              renderList();
              setTimeout(() => {
                const newSpans = $listItems.querySelectorAll('.list-item-text');
                if (newSpans.length > 0) newSpans[newSpans.length - 1].focus();
              }, 0);
            }
          }
        });
      });

      // Placeholder - click anywhere on row to focus
      const $placeholder = $listItems.querySelector('.list-placeholder');
      const $placeholderText = $placeholder.querySelector('.list-placeholder-text');

      $placeholder.addEventListener('click', (e) => {
        if (e.target !== $placeholderText) {
          $placeholderText.focus();
        }
      });

      $placeholderText.addEventListener('input', () => {
        replaceArrowsInContentEditable($placeholderText);
      });

      $placeholderText.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          const text = $placeholderText.textContent.trim();
          if (text) {
            const items = loadList();
            items.push({ id: generateId(), text, done: false });
            saveList(items);
            renderList();
            setTimeout(() => {
              $listItems.querySelector('.list-placeholder-text').focus();
            }, 0);
          }
        } else if (e.key === 'Backspace' && $placeholderText.textContent === '') {
          e.preventDefault();
          const allItems = $listItems.querySelectorAll('.list-item-text');
          if (allItems.length > 0) focusAtEnd(allItems[allItems.length - 1]);
        }
      });
    };

    // Render Plan Mode
    const renderPlan = () => {
      const plan = loadPlan(currentDate);

      $goalInput.textContent = plan.goal || '';
      $currentDate.textContent = displayDate(currentDate);
      $goalSection.classList.toggle('completed', plan.goalCompleted || false);
      $goalSection.classList.toggle('empty', !plan.goal);

      // Nice to do
      renderNiceItems(plan.niceToDo);
    };

    // Helper to normalize nice items (support old string format and new object format)
    const getNiceItemText = (item) => typeof item === 'string' ? item : item.text;
    const getNiceItemDone = (item) => typeof item === 'string' ? false : item.done;
    const setNiceItemText = (items, i, text) => {
      if (typeof items[i] === 'string') {
        items[i] = { text, done: false };
      } else {
        items[i].text = text;
      }
    };
    const setNiceItemDone = (items, i, done) => {
      if (typeof items[i] === 'string') {
        items[i] = { text: items[i], done };
      } else {
        items[i].done = done;
      }
    };

    const renderNiceItems = (items) => {
      // Ensure there's always at least one empty item to click into
      const displayItems = items.length === 0 ? [{ text: '', done: false }] : items;
      $niceItems.innerHTML = displayItems.map((item, i) => `
        <div class="nice-item-wrapper ${getNiceItemDone(item) ? 'done' : ''} ${!getNiceItemText(item) ? 'empty' : ''}" data-index="${i}">
          <div class="nice-item" contenteditable="true">${escapeHtml(getNiceItemText(item))}</div>
          <div class="item-actions">
            <button class="action-btn check-btn">${checkIcon}</button>
          </div>
        </div>
      `).join('');

      // Attach listeners
      $niceItems.querySelectorAll('.nice-item-wrapper').forEach((wrapper, i) => {
        const el = wrapper.querySelector('.nice-item');
        const checkBtn = wrapper.querySelector('.check-btn');

        el.addEventListener('input', () => {
          replaceArrowsInContentEditable(el);
          const plan = loadPlan(currentDate);
          // Ensure array has this index (for placeholder item)
          while (plan.niceToDo.length <= i) {
            plan.niceToDo.push({ text: '', done: false });
          }
          setNiceItemText(plan.niceToDo, i, el.textContent);
          savePlan(currentDate, plan);
          wrapper.classList.toggle('empty', !el.textContent);
        });

        checkBtn.addEventListener('click', () => {
          const plan = loadPlan(currentDate);
          const currentDone = getNiceItemDone(plan.niceToDo[i]);
          setNiceItemDone(plan.niceToDo, i, !currentDone);
          savePlan(currentDate, plan);
          renderPlan();
        });

        el.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
            e.preventDefault();
            const plan = loadPlan(currentDate);
            plan.niceToDo.splice(i + 1, 0, { text: '', done: false });
            savePlan(currentDate, plan);
            renderPlan();
            setTimeout(() => {
              const newEl = $niceItems.querySelectorAll('.nice-item')[i + 1];
              if (newEl) newEl.focus();
            }, 0);
          } else if (e.key === 'Backspace' && el.textContent === '') {
            e.preventDefault();
            const plan = loadPlan(currentDate);
            plan.niceToDo.splice(i, 1);
            savePlan(currentDate, plan);
            renderPlan();
            setTimeout(() => {
              const prevEl = $niceItems.querySelectorAll('.nice-item')[i - 1];
              if (prevEl) focusAtEnd(prevEl);
            }, 0);
          } else if (e.key === 'Tab' && e.shiftKey) {
            e.preventDefault();
            if (i > 0) {
              const prevEl = $niceItems.querySelectorAll('.nice-item')[i - 1];
              if (prevEl) focusAtEnd(prevEl);
            } else {
              focusAtEnd($goalInput);
            }
          } else if ((e.key === 'Tab' && !e.shiftKey) || e.key === 'ArrowDown') {
            e.preventDefault();
            const allItems = $niceItems.querySelectorAll('.nice-item');
            if (i < allItems.length - 1) {
              focusAtEnd(allItems[i + 1]);
            } else {
              // Last item - create a new one
              const plan = loadPlan(currentDate);
              plan.niceToDo.push({ text: '', done: false });
              savePlan(currentDate, plan);
              renderPlan();
              setTimeout(() => {
                const newEl = $niceItems.querySelectorAll('.nice-item')[i + 1];
                if (newEl) newEl.focus();

          } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            if (i > 0) {
              const prevEl = $niceItems.querySelectorAll('.nice-item')[i - 1];
              if (prevEl) focusAtEnd(prevEl);
            } else {
              focusAtEnd($goalInput);
            }
          }
        });

    const escapeHtml = (text) => {
      const div = document.createElement('div');

    const focusAtEnd = (el) => {
      el.focus();
      const range = document.createRange();
      range.selectNodeContents(el);
      range.collapse(false);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
    };

    // Auto-replace arrows
    const arrowReplacements = [
      { pattern: '->', replacement: '→' },
      { pattern: '=>', replacement: '⇒' }
    ];

    const replaceArrowsInInput = (input) => {
      let val = input.value;
      let pos = input.selectionStart;
      for (const { pattern, replacement } of arrowReplacements) {
        const idx = val.lastIndexOf(pattern, pos);
        if (idx !== -1 && idx + pattern.length === pos) {
          input.value = val.slice(0, idx) + replacement + val.slice(pos);
          input.setSelectionRange(idx + 1, idx + 1);
          return true;
        }
      }
      return false;
    };

    const replaceArrowsInContentEditable = (el) => {
      const sel = window.getSelection();
      if (!sel.rangeCount) return false;

      const range = sel.getRangeAt(0);
      const node = range.startContainer;
      if (node.nodeType !== Node.TEXT_NODE) return false;

      const text = node.textContent;
      const pos = range.startOffset;

      for (const { pattern, replacement } of arrowReplacements) {
        const idx = text.lastIndexOf(pattern, pos);
        if (idx !== -1 && idx + pattern.length === pos) {
          node.textContent = text.slice(0, idx) + replacement + text.slice(pos);
          const newRange = document.createRange();
          newRange.setStart(node, idx + 1);
          newRange.collapse(true);
          sel.removeAllRanges();
          sel.addRange(newRange);
          return true;
        }
      }
      return false;
    };

    const triggerConfetti = () => {
      const canvas = $confettiCanvas;
      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      const colors = ['#f44336', '#e91e63', '#9c27b0', '#673ab7', '#3f51b5', '#2196f3', '#03a9f4', '#00bcd4', '#009688', '#4caf50', '#8bc34a', '#cddc39', '#ffeb3b', '#ffc107', '#ff9800', '#ff5722', '#d4af37'];

      const confetti = [];
      const confettiCount = 300;

      for (let i = 0; i < confettiCount; i++) {
        confetti.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height - canvas.height,
          w: Math.random() * 10 + 5,
          h: Math.random() * 6 + 4,
          color: colors[Math.floor(Math.random() * colors.length)],
          speed: Math.random() * 3 + 2,
          angle: Math.random() * Math.PI * 2,
          spin: (Math.random() - 0.5) * 0.2,
          drift: (Math.random() - 0.5) * 2,
          wobble: Math.random() * 10,
          wobbleSpeed: Math.random() * 0.1 + 0.05,
          opacity: 1
        });
      }

      let animationId;
      const startTime = Date.now();
      const duration = 4000;

      const animate = () => {
        const elapsed = Date.now() - startTime;
        const progress = elapsed / duration;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        let activeCount = 0;
        confetti.forEach(c => {
          if (c.y < canvas.height + 50 && c.opacity > 0) {
            activeCount++;
            c.y += c.speed;
            c.x += c.drift + Math.sin(c.wobble) * 0.5;
            c.wobble += c.wobbleSpeed;
            c.angle += c.spin;

            if (progress > 0.7) {
              c.opacity = Math.max(0, 1 - (progress - 0.7) / 0.3);
            }

            ctx.save();
            ctx.translate(c.x, c.y);
            ctx.rotate(c.angle);
            ctx.globalAlpha = c.opacity;
            ctx.fillStyle = c.color;
            ctx.fillRect(-c.w / 2, -c.h / 2, c.w, c.h);
            ctx.restore();
          }
        });

        if (activeCount > 0 && elapsed < duration) {
          animationId = requestAnimationFrame(animate);
        } else {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
      };

      animate();
    };

    const TIMER_DURATION_KEY = 'onething-timer-duration';
    const TIMER_SECONDS_KEY = 'onething-timer-seconds';

    const savedRunning = localStorage.getItem(TIMER_RUNNING_KEY);
    const savedFocus = localStorage.getItem(TIMER_FOCUS_KEY);

    let timerDuration = savedDuration ? parseInt(savedDuration, 10) : 20 * 60;
    let timerSeconds = savedSeconds ? parseInt(savedSeconds, 10) : timerDuration;

    if (savedFocus) {
      $timerFocus.textContent = savedFocus;
    }
    let timerInterval = null;
    let timerRunning = false;

    const formatTimer = (seconds) => {
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return `${m}:${String(s).padStart(2, '0')}`;
    };

    const parseTimer = (str) => {
      const cleaned = str.trim();
      // Try to parse MM:SS or M:SS
      const match = cleaned.match(/^(\d+):(\d{1,2})$/);
      if (match) {
        const m = parseInt(match[1], 10);
        const s = parseInt(match[2], 10);
        if (s < 60) return m * 60 + s;
      }
      // Try to parse as just minutes
      const mins = parseInt(cleaned, 10);
      if (!isNaN(mins) && mins > 0) return mins * 60;
      return null;
    };

    const updateTimerDisplay = () => {
      $timerDisplay.textContent = formatTimer(timerSeconds);
      localStorage.setItem(TIMER_SECONDS_KEY, timerSeconds);
      updateResetVisibility();

      if (timerSeconds < timerDuration) {
        $timer.classList.add('can-reset');
      } else {

    const startTimer = (focusField = true) => {
      if (timerSeconds <= 0) return;
      timerRunning = true;
      $timer.classList.remove('paused');
      $timer.classList.add('running');
      $playIcon.style.display = 'none';
      $pauseIcon.style.display = 'block';
      $timerPlayPause.title = 'Pause';
      $timerDisplay.contentEditable = 'false';
      localStorage.setItem(TIMER_RUNNING_KEY, 'true');

      // Focus the focus field if empty (only on manual start)
      if (focusField && !$timerFocus.textContent.trim()) {
        $timerFocus.focus();
      }

      timerInterval = setInterval(() => {
        timerSeconds--;
        updateTimerDisplay();
        if (timerSeconds <= 0) {
          pauseTimer();
        }
      }, 1000);
    };

    const pauseTimer = () => {
      timerRunning = false;

      localStorage.setItem(TIMER_RUNNING_KEY, 'false');

      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
      updateResetVisibility();
    };

    const resetTimer = () => {
      pauseTimer();
      timerSeconds = timerDuration;

    };

        const $newStatus = document.getElementById('sync-status');

        $newConnectBtn.addEventListener('click', async () => {
          const passphrase = $newPassphrase.value.trim();
          if (!passphrase) {
            $newStatus.textContent = 'Please enter a passphrase';
            $newStatus.className = 'sync-status error';
            $newStatus.style.display = 'block';
            return;
          }
          if (passphrase.length < 4) {
            $newStatus.textContent = 'Passphrase must be at least 4 characters';
            $newStatus.className = 'sync-status error';
            $newStatus.style.display = 'block';
            return;
          }

          $newConnectBtn.disabled = true;
          $newStatus.textContent = 'Connecting...';
          $newStatus.className = 'sync-status info';
          $newStatus.style.display = 'block';

          try {
            // Check if sync URL is configured
            if (SYNC_API_URL.includes('REPLACE_ME')) {
              throw new Error('Sync backend not configured. See CLAUDE.md for setup instructions.');
            }

            syncPassphrase = passphrase;
            localStorage.setItem(SYNC_PASSPHRASE_KEY, passphrase);

            // Do initial full sync
            await performFullSync();

            syncEnabled = true;
            localStorage.setItem(SYNC_ENABLED_KEY, 'true');
            updateSyncToggle('synced');

            $newStatus.textContent = 'Connected! Your data is now syncing.';
            $newStatus.className = 'sync-status success';

            setTimeout(() => closeSyncModal(), 1500);
          } catch (error) {
            $newStatus.textContent = 'Failed to connect: ' + error.message;
            $newStatus.className = 'sync-status error';
            $newConnectBtn.disabled = false;
          }
        });
      }
      $syncModal.classList.add('open');
      $syncModalOverlay.classList.add('open');
    };

    const closeSyncModal = () => {
      $syncModal.classList.remove('open');
      $syncModalOverlay.classList.remove('open');
    };

    const getLastSyncDisplay = () => {
      const lastSync = parseInt(localStorage.getItem(SYNC_LAST_SYNC_KEY) || '0', 10);
      if (!lastSync) return 'Never';
      const diff = Date.now() - lastSync;
      if (diff < 60000) return 'Just now';
      if (diff < 3600000) return Math.floor(diff / 60000) + ' minutes ago';
      if (diff < 86400000) return Math.floor(diff / 3600000) + ' hours ago';
      return new Date(lastSync).toLocaleDateString();
    };

    // Push local changes to server
    const pushChanges = async () => {
      if (!syncEnabled || !syncPassphrase) return;

      const keys = getSyncableKeys();
      const data = keys.map(key => ({
        key,
        value: localStorage.getItem(key) || '',
        updatedAt: Date.now()
      }));

      const response = await fetch(`${SYNC_API_URL}/sync/push`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ passphrase: syncPassphrase, data })
      });

      if (!response.ok) throw new Error('Push failed');
      return response.json();
    };

    // Pull changes from server
    const pullChanges = async (since = 0) => {
      if (!syncEnabled || !syncPassphrase) return;

      const response = await fetch(`${SYNC_API_URL}/sync/pull`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ passphrase: syncPassphrase, since })
      });

      if (!response.ok) throw new Error('Pull failed');
      return response.json();
    };

    // Full sync (initial connect)
    const performFullSync = async () => {
      // First push all local data
      await pushChanges();

      // Then pull all remote data
      const response = await fetch(`${SYNC_API_URL}/sync/full`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ passphrase: syncPassphrase })
      });

      if (!response.ok) throw new Error('Full sync failed');

      const result = await response.json();

      // Apply remote changes (last-write-wins)
      isApplyingSync = true;
      for (const item of result.data) {
        localStorage.setItem(item.key, item.value);
      }
      isApplyingSync = false;

      localStorage.setItem(SYNC_LAST_SYNC_KEY, String(result.serverTime));

      // Re-render UI with synced data
      renderPlan();
      if (sidebarOpen) renderList();
      loadTheme();
    };

    // Regular sync (push local, pull remote)
    const performSync = async (force = false) => {
      if (isSyncing || (!syncEnabled && !force)) return;

      isSyncing = true;
      updateSyncToggle('syncing');

      try {
        // Push local changes
        await pushChanges();

        // Pull remote changes
        const lastSync = parseInt(localStorage.getItem(SYNC_LAST_SYNC_KEY) || '0', 10);
        const result = await pullChanges(lastSync);

        if (result && result.data && result.data.length > 0) {
          // Apply remote changes
          isApplyingSync = true;
          for (const item of result.data) {
            localStorage.setItem(item.key, item.value);
          }
          isApplyingSync = false;
          // Re-render UI
          renderPlan();
          if (sidebarOpen) renderList();
          loadTheme();
        }

        if (result && result.serverTime) {
          localStorage.setItem(SYNC_LAST_SYNC_KEY, String(result.serverTime));
        }

        updateSyncToggle('synced');
      } catch (error) {
        console.error('Sync error:', error);
        updateSyncToggle('error');
      } finally {
        isSyncing = false;
      }
    };

    // Debounced sync on data change
    const queueSync = () => {
      if (!syncEnabled) return;
      if (syncDebounceTimer) clearTimeout(syncDebounceTimer);
      syncDebounceTimer = setTimeout(() => performSync(), 2000);
    };

    // Override localStorage.setItem to trigger sync
    const originalSetItem = localStorage.setItem.bind(localStorage);
    localStorage.setItem = (key, value) => {
      originalSetItem(key, value);
      if (!isApplyingSync && key.startsWith('onething-') && !key.startsWith('onething-sync-') &&
          key !== 'onething-timer-running' && key !== 'onething-timer-seconds') {
        queueSync();
      }
    };

    // Event listeners
    $syncToggle.addEventListener('click', openSyncModal);
    $syncModalOverlay.addEventListener('click', closeSyncModal);
    $syncModalClose.addEventListener('click', closeSyncModal);

    // Initial sync on load if enabled
    if (syncEnabled && syncPassphrase) {
      updateSyncToggle('synced');
      setTimeout(() => performSync(), 1000);
      // Auto-sync every 10 seconds
      setInterval(() => performSync(), 10000);
    }

    // ===== MOBILE SWIPE TO COMPLETE =====
    const isMobile = window.matchMedia('(max-width: 600px)').matches;

    if (isMobile) {
      let touchStartX = 0;
      let touchStartY = 0;
      let swipeTarget = null;

      document.addEventListener('touchstart', (e) => {
        const target = e.target.closest('.goal-wrapper, .nice-item-wrapper');
        if (target) {
          touchStartX = e.touches[0].clientX;
          touchStartY = e.touches[0].clientY;
          swipeTarget = target;
        }
      }, { passive: true });

      document.addEventListener('touchend', (e) => {
        if (!swipeTarget) return;

        const touchEndX = e.changedTouches[0].clientX;
        const touchEndY = e.changedTouches[0].clientY;
        const deltaX = touchEndX - touchStartX;
        const deltaY = Math.abs(touchEndY - touchStartY);

        // Swipe right: deltaX > 50px and mostly horizontal
        if (deltaX > 50 && deltaY < 50) {
          if (swipeTarget.classList.contains('goal-wrapper')) {
            // Toggle goal completion
            const plan = loadPlan(currentDate);
            plan.goalCompleted = !plan.goalCompleted;
            savePlan(currentDate, plan);
            $goalSection.classList.toggle('completed', plan.goalCompleted);
            if (plan.goalCompleted) triggerConfetti();
          } else if (swipeTarget.classList.contains('nice-item-wrapper')) {
            // Toggle nice item completion
            const index = parseInt(swipeTarget.dataset.index, 10);
            const plan = loadPlan(currentDate);
            if (plan.niceToDo[index] !== undefined) {
              const currentDone = getNiceItemDone(plan.niceToDo[index]);
              setNiceItemDone(plan.niceToDo, index, !currentDone);
              savePlan(currentDate, plan);
              renderPlan();
            }
          }
        }

        swipeTarget = null;
      }, { passive: true });
    }
  </script>
</body>
</html>
